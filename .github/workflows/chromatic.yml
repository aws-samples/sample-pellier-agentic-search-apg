# Chromatic workflow: visual regression snapshots on every PR.
#
# Design contract: .kiro/specs/pellier-storefront/tasks.md — task 7.2
# ("Visual regression"); ties to requirements.md Req 5.2.1–5.2.3 (responsive
# breakpoints) and Req 1.6.2 (product-card parallax timing fidelity).
#
# This workflow is scaffolding. It runs only when Chromatic is wired up, i.e.
# when the CHROMATIC_PROJECT_TOKEN secret is set on the repo. Until then the
# `secret-check` job short-circuits so PRs are not blocked by a missing token.
#
# Required GitHub Actions secret (configure at repo or org level):
#
#   CHROMATIC_PROJECT_TOKEN  - project token from https://www.chromatic.com
#                              (Settings → Manage → Project token). Scoped
#                              to this project only.
#
# Setup reference: tests/visual-regression/README.md

name: chromatic

on:
  pull_request:
    branches: [mainline, main]
  push:
    branches: [mainline, main]
  workflow_dispatch: {}

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-check:
    name: Verify Chromatic token is configured
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CHROMATIC_PROJECT_TOKEN is not set; skipping snapshot run. See tests/visual-regression/README.md."
          fi

  chromatic:
    name: Publish Storybook to Chromatic
    needs: secret-check
    if: needs.secret-check.outputs.has_token == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Chromatic compares against the baseline of the parent branch, so
        # it needs full history. `fetch-depth: 0` is Chromatic's
        # recommended default.
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pellier/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: pellier/frontend
        run: npm ci

      # Build Storybook and upload to Chromatic in one step.
      # --exit-zero-on-changes: visual diffs do NOT fail the job on their own;
      # Chromatic's required-check on the PR is what blocks merging. The job
      # still fails on build errors, broken stories, or upload failures.
      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: pellier/frontend
          buildScriptName: build-storybook
          exitZeroOnChanges: true
          onlyChanged: true
