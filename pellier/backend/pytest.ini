[pytest]
testpaths = tests

filterwarnings =
    # Starlette 0.50+ deprecates per-request `cookies=` kwargs on TestClient
    # calls in favor of `client.cookies = {...}`. Our tests intentionally
    # scope the cookie to a single request (auth state varies per call), so
    # silence this one deprecation rather than rewrite every call site.
    ignore:Setting per-request cookies.*:DeprecationWarning:starlette.*
