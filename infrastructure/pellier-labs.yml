AWSTemplateFormatVersion: 2010-09-09

Description: >
  Pellier - Parent stack. Composes VPC, Aurora (pgvector 0.8.0),
  Cognito (with federated IdPs and test-user seeding), and the Code Editor
  instance. Designed for the AWS re:Invent 2026 DAT406 workshop.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Workshop Identity
        Parameters:
          - WorkshopId
          - WorkshopDomain
      - Label:
          default: Database
        Parameters:
          - AuroraEngineVersion
      - Label:
          default: Cognito Federation
        Parameters:
          - EnableGoogleSignIn
          - GoogleOAuthSecretArn
          - EnableAppleSignIn
          - AppleOAuthSecretArn
          - NumberOfTestUsers
      - Label:
          default: Workshop Assets (for nested templates)
        Parameters:
          - TemplatesBaseUrl

Parameters:
  WorkshopId:
    Type: String
    Description: Workshop identifier (e.g., "reinvent2026-session-a").
    AllowedPattern: ^[a-z0-9][a-z0-9-]{2,40}$
    ConstraintDescription: 3-41 chars, lowercase/digits/hyphens.

  WorkshopDomain:
    Type: String
    Description: >
      Public-facing workshop domain (e.g., "pellier-reinvent2026a.example.com").
      Used to build OAuth callback and logout URLs.
    AllowedPattern: ^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$

  AuroraEngineVersion:
    Type: String
    Default: "17.7"
    Description: Aurora PostgreSQL engine version. Bump before re:Invent.

  GoogleOAuthSecretArn:
    Type: String
    Default: ""
    Description: >
      Secrets Manager ARN holding Google OAuth client_id and client_secret.
      Required only when EnableGoogleSignIn is "true"; populate out-of-band
      before first deploy for real workshop sessions.

  EnableGoogleSignIn:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      Flip to "false" for throwaway deploys that only need email/password
      auth. Real workshop sessions should keep this "true" and supply
      GoogleOAuthSecretArn.

  AppleOAuthSecretArn:
    Type: String
    Default: ""
    Description: >
      Secrets Manager ARN holding Apple Sign-In credentials. Only required
      if EnableAppleSignIn is "true".

  EnableAppleSignIn:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Flip to "true" after populating AppleOAuthSecretArn.

  NumberOfTestUsers:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 50

  LabFormat:
    Type: String
    AllowedValues:
      - workshop
      - builders
    Default: workshop
    Description: >
      Which lab format this deployment serves.
      - workshop (120 min, re:Invent): all stubs stay in place; participants
        build Stock Keeper + Experience Guide + 5 tools over 90 min of
        hands-on.
      - builders (60 min, DC Summit): Experience Guide + restock_shelf +
        running_low are pre-applied; participants build Stock Keeper's
        system prompt + floor_check only.

  RepoUrl:
    Type: String
    Default: https://github.com/aws-samples/sample-pellier-agentic-search-apg.git

  RepoBranch:
    Type: String
    Default: main
    Description: Git branch to check out on the Code Editor instance.

  TemplatesBaseUrl:
    Type: String
    Description: >
      Base URL (S3 HTTP or raw GitHub) for child templates. The parent
      stack will resolve pellier-vpc.yml, pellier-database.yml,
      pellier-cognito.yml, and pellier-code-editor.yml
      relative to this.

Rules:
  # Catch silent misconfig where someone enables a federated IdP but forgets
  # to populate the secret. These are evaluated at stack-create time before
  # any resources provision, so the error surfaces immediately.
  GoogleSecretRequiredWhenEnabled:
    RuleCondition: !Equals [!Ref EnableGoogleSignIn, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref GoogleOAuthSecretArn, ""]]
        AssertDescription: >
          GoogleOAuthSecretArn is required when EnableGoogleSignIn=true.
          Either populate the secret ARN or set EnableGoogleSignIn=false
          for a throwaway deploy with email/password auth only.
  AppleSecretRequiredWhenEnabled:
    RuleCondition: !Equals [!Ref EnableAppleSignIn, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref AppleOAuthSecretArn, ""]]
        AssertDescription: >
          AppleOAuthSecretArn is required when EnableAppleSignIn=true.
          Populate the Apple Sign-In credentials secret or leave
          EnableAppleSignIn=false.

Resources:
  VpcStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/pellier-vpc.yml
      Parameters:
        WorkshopId: !Ref WorkshopId
      Tags:
        - Key: Project
          Value: pellier
        - Key: "re:Invent"
          Value: "2026"

  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/pellier-database.yml
      Parameters:
        WorkshopId: !Ref WorkshopId
        PrivateSubnetA: !GetAtt VpcStack.Outputs.PrivateSubnetA
        PrivateSubnetB: !GetAtt VpcStack.Outputs.PrivateSubnetB
        AuroraSecurityGroupId: !GetAtt VpcStack.Outputs.AuroraSecurityGroupId
        AuroraEngineVersion: !Ref AuroraEngineVersion
      Tags:
        - Key: Project
          Value: pellier
        - Key: "re:Invent"
          Value: "2026"

  CognitoStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/pellier-cognito.yml
      Parameters:
        WorkshopId: !Ref WorkshopId
        CallbackUrls: !Sub https://${WorkshopDomain}/api/auth/callback
        LogoutUrls: !Sub https://${WorkshopDomain}/
        EnableGoogleSignIn: !Ref EnableGoogleSignIn
        GoogleOAuthSecretArn: !Ref GoogleOAuthSecretArn
        AppleOAuthSecretArn: !Ref AppleOAuthSecretArn
        EnableAppleSignIn: !Ref EnableAppleSignIn
        NumberOfTestUsers: !Ref NumberOfTestUsers
      Tags:
        - Key: Project
          Value: pellier
        - Key: "re:Invent"
          Value: "2026"

  CodeEditorStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/pellier-code-editor.yml
      Parameters:
        WorkshopId: !Ref WorkshopId
        PublicSubnetId: !GetAtt VpcStack.Outputs.PublicSubnetA
        CodeEditorSecurityGroupId: !GetAtt VpcStack.Outputs.CodeEditorSecurityGroupId
        DBSecretArn: !GetAtt DatabaseStack.Outputs.MasterSecretArn
        DBClusterEndpoint: !GetAtt DatabaseStack.Outputs.ClusterEndpoint
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        UserPoolClientId: !GetAtt CognitoStack.Outputs.UserPoolClientId
        UserPoolClientSecretArn: !GetAtt CognitoStack.Outputs.UserPoolClientSecretArn
        UserPoolDomain: !GetAtt CognitoStack.Outputs.UserPoolDomain
        HostedUiUrl: !GetAtt CognitoStack.Outputs.HostedUiUrl
        TestUserCredentialsSecretArn: !GetAtt CognitoStack.Outputs.TestUserCredentialsSecretArn
        LabFormat: !Ref LabFormat
        RepoUrl: !Ref RepoUrl
        RepoBranch: !Ref RepoBranch
      Tags:
        - Key: Project
          Value: pellier
        - Key: "re:Invent"
          Value: "2026"

Outputs:
  WorkshopId:
    Value: !Ref WorkshopId
  AuroraClusterEndpoint:
    Value: !GetAtt DatabaseStack.Outputs.ClusterEndpoint
  AuroraMasterSecretArn:
    Value: !GetAtt DatabaseStack.Outputs.MasterSecretArn
  UserPoolId:
    Value: !GetAtt CognitoStack.Outputs.UserPoolId
  UserPoolClientId:
    Value: !GetAtt CognitoStack.Outputs.UserPoolClientId
  UserPoolClientSecretArn:
    Value: !GetAtt CognitoStack.Outputs.UserPoolClientSecretArn
  HostedUiUrl:
    Value: !GetAtt CognitoStack.Outputs.HostedUiUrl
  JwksUri:
    Value: !GetAtt CognitoStack.Outputs.JwksUri
  TestUserCredentialsSecretArn:
    Value: !GetAtt CognitoStack.Outputs.TestUserCredentialsSecretArn
  CodeEditorUrl:
    Value: !GetAtt CodeEditorStack.Outputs.CloudFrontUrl
