AWSTemplateFormatVersion: 2010-09-09

Description: >
  Pellier - Aurora PostgreSQL Serverless v2 with pgvector 0.8.0.
  Engine version is parameter-driven (default 17.7) so the stack bumps
  cleanly at re:Invent time. IAM database auth enabled for pellier_app role.

Parameters:
  WorkshopId:
    Type: String
    AllowedPattern: ^[a-z0-9][a-z0-9-]{2,40}$

  PrivateSubnetA:
    Type: AWS::EC2::Subnet::Id

  PrivateSubnetB:
    Type: AWS::EC2::Subnet::Id

  AuroraSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  AuroraEngineVersion:
    Type: String
    Default: "17.7"
    Description: Aurora PostgreSQL engine version. Bump before re:Invent.

  MinCapacity:
    Type: Number
    Default: 0
    Description: Min Serverless v2 ACU (0 = scale-to-zero).
    MinValue: 0
    MaxValue: 128

  MaxCapacity:
    Type: Number
    Default: 16
    Description: Max Serverless v2 ACU.
    MinValue: 0.5
    MaxValue: 128

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub Pellier Aurora subnet group (${WorkshopId})
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: Project
          Value: pellier
        - Key: re:Invent
          Value: "2026"

  ClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: !Sub Pellier Aurora cluster parameter group (${WorkshopId})
      Family: !Sub
        - aurora-postgresql${MajorVersion}
        - MajorVersion: !Select [0, !Split [".", !Ref AuroraEngineVersion]]
      Parameters:
        shared_preload_libraries: pg_stat_statements
        rds.force_ssl: "1"
      Tags:
        - Key: Project
          Value: pellier

  DBClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole

  MasterSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub pellier-db-secret-${WorkshopId}
      Description: Aurora master credentials for Pellier
      GenerateSecretString:
        SecretStringTemplate: '{"username":"postgres"}'
        GenerateStringKey: password
        PasswordLength: 24
        ExcludeCharacters: '"@/\'''
      Tags:
        - Key: Project
          Value: pellier
        - Key: re:Invent
          Value: "2026"

  DBCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBClusterIdentifier: !Sub pellier-cluster-${WorkshopId}
      DatabaseName: pellier
      Engine: aurora-postgresql
      EngineVersion: !Ref AuroraEngineVersion
      EngineMode: provisioned
      MasterUsername: !Sub "{{resolve:secretsmanager:${MasterSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${MasterSecret}:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraSecurityGroupId
      DBClusterParameterGroupName: !Ref ClusterParameterGroup
      EnableIAMDatabaseAuthentication: true
      BackupRetentionPeriod: 1
      StorageEncrypted: true
      ServerlessV2ScalingConfiguration:
        MinCapacity: !Ref MinCapacity
        MaxCapacity: !Ref MaxCapacity
      Tags:
        - Key: Project
          Value: pellier
        - Key: re:Invent
          Value: "2026"

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub pellier-writer-${WorkshopId}
      DBClusterIdentifier: !Ref DBCluster
      Engine: aurora-postgresql
      DBInstanceClass: db.serverless
      PubliclyAccessible: false
      Tags:
        - Key: Project
          Value: pellier

  SecretTargetAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref MasterSecret
      TargetId: !Ref DBCluster
      TargetType: AWS::RDS::DBCluster

Outputs:
  ClusterEndpoint:
    Value: !GetAtt DBCluster.Endpoint.Address
    Export:
      Name: !Sub ${AWS::StackName}-ClusterEndpoint
  ClusterPort:
    Value: !GetAtt DBCluster.Endpoint.Port
    Export:
      Name: !Sub ${AWS::StackName}-ClusterPort
  ClusterResourceId:
    Value: !GetAtt DBCluster.DBClusterResourceId
    Export:
      Name: !Sub ${AWS::StackName}-ClusterResourceId
  ClusterIdentifier:
    Value: !Ref DBCluster
    Export:
      Name: !Sub ${AWS::StackName}-ClusterIdentifier
  MasterSecretArn:
    Value: !Ref MasterSecret
    Export:
      Name: !Sub ${AWS::StackName}-MasterSecretArn
  DatabaseName:
    Value: pellier
    Export:
      Name: !Sub ${AWS::StackName}-DatabaseName
