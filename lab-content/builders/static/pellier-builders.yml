AWSTemplateFormatVersion: 2010-09-09

Description: "Pellier: 60-min Builders Session orchestrator (VPC, Aurora PostgreSQL with pgvector, Code Editor on EC2 with CloudFront)"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Workshop Studio Assets
        Parameters:
          - AssetsBucketName
          - AssetsBucketPrefix
      - Label:
          default: Database
        Parameters:
          - AuroraEngineVersion
      - Label:
          default: Source Repository
        Parameters:
          - RepoUrl
          - RepoBranch

Parameters:
  AssetsBucketName:
    Type: String
    Description: >
      S3 bucket name where Workshop Studio uploaded the lab assets.
      Populated by Workshop Studio from {{.AssetsBucketName}}.

  AssetsBucketPrefix:
    Type: String
    Description: >
      Key prefix under AssetsBucketName (already includes the trailing
      slash). Populated by Workshop Studio from {{.AssetsBucketPrefix}}.

  AuroraEngineVersion:
    Type: String
    Default: "17.7"
    Description: Aurora PostgreSQL engine version.

  RepoUrl:
    Type: String
    Default: https://github.com/aws-samples/sample-pellier-agentic-search-apg.git

  RepoBranch:
    Type: String
    Default: main
    Description: Git branch to check out on the Code Editor instance.

Mappings:
  # Region -> S3 regional endpoint host. Workshop Studio currently
  # deploys in us-west-2 only; the table is here so adding a region
  # is one line.
  RegionToS3Host:
    us-west-2:
      Host: s3.us-west-2.amazonaws.com
    us-east-1:
      Host: s3.amazonaws.com

Resources:
  # Each child stack uses WorkshopId for resource names that have
  # strict character rules (Aurora identifiers, EC2 tags). Workshop
  # Studio stack names contain mixed case and slashes, so we derive
  # a stable 9-char lowercase identifier from the StackId UUID:
  #   "p" + first 8 hex chars of the UUID head.

  VpcStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL: !Sub
        - https://${AssetsBucketName}.${S3Host}/${AssetsBucketPrefix}pellier-vpc.yml
        - S3Host: !FindInMap [RegionToS3Host, !Ref "AWS::Region", Host]
      Parameters:
        WorkshopId: !Sub
          - "p${UuidHead}"
          - UuidHead:
              !Select [
                0,
                !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]],
              ]
      Tags:
        - Key: Project
          Value: pellier
        - Key: Event
          Value: dc-summit-2026

  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL: !Sub
        - https://${AssetsBucketName}.${S3Host}/${AssetsBucketPrefix}pellier-database.yml
        - S3Host: !FindInMap [RegionToS3Host, !Ref "AWS::Region", Host]
      Parameters:
        WorkshopId: !Sub
          - "p${UuidHead}"
          - UuidHead:
              !Select [
                0,
                !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]],
              ]
        PrivateSubnetA: !GetAtt VpcStack.Outputs.PrivateSubnetA
        PrivateSubnetB: !GetAtt VpcStack.Outputs.PrivateSubnetB
        AuroraSecurityGroupId: !GetAtt VpcStack.Outputs.AuroraSecurityGroupId
        AuroraEngineVersion: !Ref AuroraEngineVersion
      Tags:
        - Key: Project
          Value: pellier
        - Key: Event
          Value: dc-summit-2026

  CodeEditorStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL: !Sub
        - https://${AssetsBucketName}.${S3Host}/${AssetsBucketPrefix}pellier-code-editor.yml
        - S3Host: !FindInMap [RegionToS3Host, !Ref "AWS::Region", Host]
      Parameters:
        WorkshopId: !Sub
          - "p${UuidHead}"
          - UuidHead:
              !Select [
                0,
                !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]],
              ]
        PublicSubnetId: !GetAtt VpcStack.Outputs.PublicSubnetA
        CodeEditorSecurityGroupId: !GetAtt VpcStack.Outputs.CodeEditorSecurityGroupId
        DBSecretArn: !GetAtt DatabaseStack.Outputs.MasterSecretArn
        DBClusterEndpoint: !GetAtt DatabaseStack.Outputs.ClusterEndpoint
        RepoUrl: !Ref RepoUrl
        RepoBranch: !Ref RepoBranch
      Tags:
        - Key: Project
          Value: pellier
        - Key: Event
          Value: dc-summit-2026

Outputs:
  WorkshopId:
    Description: Lowercase 9-char identifier shared across all child stacks.
    Value: !Sub
      - "p${UuidHead}"
      - UuidHead:
          !Select [
            0,
            !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]],
          ]
  AuroraClusterEndpoint:
    Value: !GetAtt DatabaseStack.Outputs.ClusterEndpoint
  AuroraMasterSecretArn:
    Value: !GetAtt DatabaseStack.Outputs.MasterSecretArn
  CodeEditorURL:
    Description: Builder's Session participant entry point.
    Value: !GetAtt CodeEditorStack.Outputs.CloudFrontUrl
