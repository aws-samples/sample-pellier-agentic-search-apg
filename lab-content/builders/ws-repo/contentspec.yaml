version: "2.0"

params:
  author: "Shayon Sanyal"
  description: "Build agentic AI-powered search with Amazon Aurora, pgvector, and Amazon Bedrock AgentCore (60-min Builder's Session, DC Summit 2026)"
  disableAssetsBusting: true
  disableBreadcrumb: false
  disableInlineCopyToClipBoard: true
  disableLanguageSwitchingButton: true
  disableNextPrev: false
  disableSearch: false
  disableShortcutsTitle: true
  themeVariant: aws

defaultLocaleCode: en-US
localeCodes:
  - en-US

additionalLinks:
  - title: Aurora PostgreSQL with pgvector
    link: https://docs.aws.amazon.com/AmazonRDS/latest/AuroraUserGuide/AuroraPostgreSQL.VectorDB.html
  - title: Amazon Bedrock AgentCore
    link: https://aws.amazon.com/bedrock/agentcore/
  - title: Strands Agents SDK
    link: https://strandsagents.com
  - title: Pellier source repo
    link: https://github.com/aws-samples/sample-pellier-agentic-search-apg

awsAccountConfig:
  accountSources:
    - WorkshopStudio
    - CustomerProvided

  serviceLinkedRoles:
    - rds.amazonaws.com

  participantRole:
    iamPolicies:
      - static/iam_policy.json
    managedPolicies:
      - "arn:aws:iam::aws:policy/AmazonBedrockFullAccess"
      - "arn:aws:iam::aws:policy/AmazonRDSFullAccess"
      - "arn:aws:iam::aws:policy/CloudWatchLogsFullAccess"
    trustedPrincipals:
      service:
        - ec2.amazonaws.com
        - bedrock.amazonaws.com
        - bedrock-agentcore.amazonaws.com
        - rds.amazonaws.com

  ec2KeyPair: false

  regionConfiguration:
    minAccessibleRegions: 1
    maxAccessibleRegions: 1
    accessibleRegions:
      required:
        - us-west-2
    deployableRegions:
      required:
        - us-west-2

infrastructure:
  cloudformationTemplates:
    - templateLocation: static/pellier-builders.yml
      label: "PellierBuildersSessionDCSummit"
      parameters:
        - templateParameter: AssetsBucketName
          defaultValue: "{{.AssetsBucketName}}"
        - templateParameter: AssetsBucketPrefix
          defaultValue: "{{.AssetsBucketPrefix}}"
        - templateParameter: AuroraEngineVersion
          defaultValue: "17.7"
        - templateParameter: RepoUrl
          defaultValue: "https://github.com/aws-samples/sample-pellier-agentic-search-apg.git"
        - templateParameter: RepoBranch
          defaultValue: "main"
      participantVisibleStackOutputs:
        - CodeEditorURL
        - AuroraClusterEndpoint
