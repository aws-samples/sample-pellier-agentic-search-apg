AWSTemplateFormatVersion: 2010-09-09

Description: >
  Pellier - VS Code Server (code-server) on c6g.2xlarge Graviton,
  fronted by CloudFront. Pre-clones repo to /home/workshop/pellier
  and runs bootstrap-environment.sh + bootstrap-labs.sh via user data.

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - W3037

Parameters:
  WorkshopId:
    Type: String
    AllowedPattern: ^[a-z0-9][a-z0-9-]{2,40}$

  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id

  CodeEditorSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  RepoUrl:
    Type: String
    Default: https://github.com/aws-samples/sample-pellier-agentic-search-apg.git

  RepoBranch:
    Type: String
    Default: main
    Description: >
      Git branch to check out. Keep at 'main' for public deployments;
      override for testing a pre-release branch during dry-runs.

  InstanceType:
    Type: String
    Default: c6g.2xlarge
    AllowedValues:
      - c6g.xlarge
      - c6g.2xlarge
      - c6g.4xlarge
      - t4g.large
      - t4g.xlarge

  VolumeSize:
    Type: Number
    Default: 100
    MinValue: 40
    MaxValue: 500

  DBSecretArn:
    Type: String
    Description: Aurora master secret ARN.

  DBClusterArn:
    Type: String
    Description: Aurora cluster ARN used by MCP Lambda Data API calls.

  DBClusterEndpoint:
    Type: String

  CognitoUserPoolId:
    Type: String
    Description: Cognito user pool id for AgentCore Gateway/Runtime JWT auth.

  CognitoClientId:
    Type: String
    Description: Cognito app client id allowed for AgentCore Gateway/Runtime JWT auth.

  AgentCoreRoleArn:
    Type: String
    Description: AgentCore Runtime execution role ARN.

  CodeEditorUser:
    Type: String
    Default: participant
    Description: >
      System user that owns Code Editor + the cloned repo. Must match
      bootstrap-environment.sh's default (`participant`); the scripts
      hard-code paths under /home/$CODE_EDITOR_USER and would need
      edits if this changes.

  HomeFolder:
    Type: String
    Default: /workshop
    Description: >
      Workspace root that holds the cloned repo. The bootstrap scripts
      hard-code /workshop/sample-pellier-agentic-search-apg in 14
      places, so changing this requires aligned edits in the scripts.

  # Amazon Linux 2023 (arm64) SSM parameter
  AmiParameter:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: pellier-instance-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: BedrockModelAccess
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:GetFoundationModel
                  - bedrock:ListFoundationModels
                Resource: "*"
              - Sid: BedrockMarketplace
                Effect: Allow
                Action:
                  - aws-marketplace:Subscribe
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Unsubscribe
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:CalledViaLast: bedrock.amazonaws.com
              # Bedrock AgentCore - runtime + control-plane memory APIs.
              # We split the two Sids because the control-plane prefix
              # (bedrock-agentcore-control) is a distinct service in
              # IAM and Workshop Studio's IAM Access Analyzer flags
              # mixing them in one statement. Splitting also lets the
              # data-plane statement scope to runtime/pellier-* while
              # the control-plane statement stays Resource: "*"
              # (CreateMemory cannot be ARN-scoped - the memory
              # resource doesn't exist until the call returns).
              - Sid: AgentCoreRuntime
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateRuntime
                  - bedrock-agentcore:InvokeRuntime
                  - bedrock-agentcore:GetSession
                  - bedrock-agentcore:PutSessionMemory
                  - bedrock-agentcore:GetSessionMemory
                  - bedrock-agentcore:InvokeGateway
                  - bedrock-agentcore:GetIdentity
                Resource: !Sub arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/pellier-*
              - Sid: AgentCoreControlMemoryAndPolicy
                Effect: Allow
                Action:
                  # Memory - provisioning + introspection. CreateMemory
                  # cannot be ARN-scoped (the resource doesn't exist
                  # until the call returns) so this Sid stays "*".
                  - bedrock-agentcore-control:CreateMemory
                  - bedrock-agentcore-control:GetMemory
                  - bedrock-agentcore-control:ListMemories
                  # Policy - Cedar engine for the BeforeToolCallEvent
                  # guardrail. Without these, agentcore_policy.py's
                  # create_policy / list_policy_engines calls would
                  # 403 and the restock_shelf > 500 demo would no-op.
                  - bedrock-agentcore-control:CreatePolicy
                  - bedrock-agentcore-control:ListPolicyEngines
                  - bedrock-agentcore-control:CreatePolicyEngine
                Resource: "*"
              - Sid: AuroraDataAccess
                Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub arn:${AWS::Partition}:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:*/pellier_app
              - Sid: SecretsManagerRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Ref DBSecretArn
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/pellier/*

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  WaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  WaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    Properties:
      Handle: !Ref WaitHandle
      Timeout: "1800"
      Count: 1

  CodeEditorInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiParameter
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnetId
      SecurityGroupIds:
        - !Ref CodeEditorSecurityGroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub pellier-${WorkshopId}-editor
        - Key: Project
          Value: pellier
        - Key: Event
          Value: dc-summit-2026
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -eux
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1

          # --- Core packages ---
          dnf update -y
          dnf install -y git jq unzip tar gzip python3.13 python3.13-pip nodejs20 npm \
              postgresql17 aws-cfn-bootstrap || true

          # --- Create workshop user early (needed for chown before bootstrap) ---
          if ! id "${CodeEditorUser}" &>/dev/null; then
            useradd -m -s /bin/bash ${CodeEditorUser}
          fi

          # --- Workspace directory ---
          # The user gets created by bootstrap-environment.sh with the
          # default home /home/${CodeEditorUser}; pip --user installs
          # land there. ${HomeFolder} is the workspace root that holds
          # the cloned repo - it must be writable by the user but is
          # NOT the user's home. Earlier revisions of this UserData
          # called `useradd -m -d ${HomeFolder}` which clobbered the
          # default home and caused pip to install nowhere reachable.
          mkdir -p ${HomeFolder}

          # --- Clone repo ---
          # Clone into the path the bootstrap scripts hard-code:
          # ${HomeFolder}/sample-pellier-agentic-search-apg (the repo
          # name from GitHub). bootstrap-environment.sh and
          # bootstrap-labs.sh both compute REPO_PATH from
          # $HOME_FOLDER/$REPO_NAME with REPO_NAME defaulting to
          # `sample-pellier-agentic-search-apg`, so the clone target
          # has to match.
          cd ${HomeFolder}
          if [ ! -d sample-pellier-agentic-search-apg ]; then
            git clone --branch ${RepoBranch} ${RepoUrl} sample-pellier-agentic-search-apg
          fi

          # --- Builder's Session pre-apply (60 min, DC Summit) ---
          #
          # bootstrap-labs.sh STEP 16 handles the builders pre-apply
          # (copies orchestrator, recommendation agent, AgentCore
          # plumbing, etc.) so we just export WORKSHOP_FORMAT here.
          export WORKSHOP_FORMAT="builders"

          # --- Export env vars so bootstrap scripts can read them ---
          cat > ${HomeFolder}/.pellier-env << EOF
          export WORKSHOP_ID="${WorkshopId}"
          export AWS_REGION="${AWS::Region}"
          export AWS_DEFAULT_REGION="${AWS::Region}"
          export DB_SECRET_ARN="${DBSecretArn}"
          export DB_CLUSTER_ARN="${DBClusterArn}"
          export DB_HOST="${DBClusterEndpoint}"
          export DB_NAME="pellier"
          export AUTH_MODE="demo"
          export COGNITO_USER_POOL_ID="${CognitoUserPoolId}"
          export COGNITO_CLIENT_ID="${CognitoClientId}"
          export AGENTCORE_ROLE_ARN="${AgentCoreRoleArn}"
          export CODE_EDITOR_USER="${CodeEditorUser}"
          export HOME_FOLDER="${HomeFolder}"
          export WORKSHOP_FORMAT="builders"
          EOF
          chown ${CodeEditorUser}:${CodeEditorUser} ${HomeFolder}/.pellier-env
          chmod 600 ${HomeFolder}/.pellier-env

          # --- Run bootstrap scripts ---
          # bootstrap-environment.sh creates the system user, installs
          # Code Editor + nginx + Python 3.13 + postgresql17, then
          # configures the auto-start. bootstrap-labs.sh applies the
          # schema migration (001_schema.sql), seeds the 40-
          # product catalog with Cohere Embed v4 embeddings, builds
          # the frontend, provisions AgentCore Memory, and starts the
          # FastAPI service on :8000. Both scripts read the env vars
          # we sourced from .pellier-env above.
          cd ${HomeFolder}/sample-pellier-agentic-search-apg
          set -a; source ${HomeFolder}/.pellier-env; set +a

          bash scripts/bootstrap-environment.sh 2>&1 | tee /var/log/bootstrap-environment.log || true
          bash scripts/bootstrap-labs.sh 2>&1 | tee /var/log/bootstrap-labs.log || true

          # --- Signal CloudFormation ---
          # cfn-signal depends on the cfnbootstrap Python module which
          # breaks after bootstrap-environment.sh switches the system
          # python to 3.13. Use curl directly against the pre-signed
          # WaitHandle URL instead.
          curl -X PUT -H 'Content-Type:' \
            --data-binary '{"Status":"SUCCESS","Reason":"UserData complete","UniqueId":"userdata","Data":"done"}' \
            '${WaitHandle}' || true

  # --------------------------------------------------------------------------
  # CloudFront distribution fronting the EC2 instance on port 80.
  # nginx (configured by bootstrap-environment.sh) is the public-facing
  # reverse proxy on :80; it terminates CloudFront connections and
  # routes:
  #
  #   /                -> 127.0.0.1:8080 (code-editor, with WS upgrade)
  #   /api/*           -> 127.0.0.1:8000 (Pellier FastAPI)
  #   /app/*           -> 127.0.0.1:8000 (Pellier SPA shortcut)
  #   /ports/8000/*    -> 127.0.0.1:8000 (code-server's port-forward path)
  #
  # Earlier revisions of this template pointed CloudFront at port 8080
  # directly, but code-editor binds to 127.0.0.1 only - CloudFront
  # connections timed out with 504. nginx on :80 is the right hop.
  #
  # Two workshop-critical knobs:
  #
  #   OriginReadTimeout: 90 - the agentic chat stream can take 60+s on
  #     an Opus cold start. CloudFront's 30s default would kill the
  #     stream mid-SSE. 90s gives headroom without hiding real hangs.
  #
  #   Compress: false - SSE through a compressed origin ends up buffered
  #     (gzip has to accumulate bytes before it can emit). The Atelier
  #     chat depends on tokens streaming visibly, so we turn compression
  #     off at the CF layer. CachingDisabled is already set, so no CF
  #     cache is lost by disabling compression.
  #
  # AllViewer origin-request policy forwards Authorization + Cookie
  # headers transparently - useful for any future auth flow even
  # though the 60-min Builder's Session runs in demo mode.
  # --------------------------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      Tags:
        - Key: Name
          Value: !Sub pellier-${WorkshopId}-cloudfront
        - Key: Project
          Value: pellier
        - Key: Event
          Value: dc-summit-2026
      DistributionConfig:
        Enabled: true
        Comment: !Sub Pellier Code Editor (${WorkshopId})
        PriceClass: PriceClass_100
        DefaultCacheBehavior:
          TargetOriginId: code-editor-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3 # AllViewer
          Compress: false
        Origins:
          - Id: code-editor-origin
            DomainName: !GetAtt CodeEditorInstance.PublicDnsName
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginReadTimeout: 90
              OriginKeepaliveTimeout: 60

Outputs:
  InstanceId:
    Value: !Ref CodeEditorInstance
    Export:
      Name: !Sub ${AWS::StackName}-InstanceId
  PublicDnsName:
    Value: !GetAtt CodeEditorInstance.PublicDnsName
    Export:
      Name: !Sub ${AWS::StackName}-PublicDnsName
  CloudFrontUrl:
    Value: !Sub https://${CloudFrontDistribution.DomainName}/?tkn=defaultPassword
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontUrl
  WorkshopReady:
    Value: !Sub "${WaitCondition}"
    Description: Signals from bootstrap completion
