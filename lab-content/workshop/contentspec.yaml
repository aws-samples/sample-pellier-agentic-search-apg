# Pellier — Workshop Studio content spec (120-minute re:Invent workshop).
#
# Instructor notes:
#   - The narrative spine is Marco's arc. Participants click pills; presenter
#     narrates. See lab-content/shared/marco-arc-overview.en.md for the spec.
#   - Marco's Turn 4 pill (warehouse stock) is clicked twice in the session:
#     once during the opening demo (Stock Keeper stubbed → graceful non-answer),
#     once during the midpoint checkpoint (Stock Keeper wired → real warehouse).
#   - Per-agent model mix is an architectural decision, not a knob. Do NOT
#     normalize. lab-content/shared/model-mix-sidebar.en.md explains why.
#   - The workshop teaches three Aurora capabilities in a ladder. See
#     lab-content/shared/aurora-capabilities-arc.en.md for the framing:
#       * Marco — pgvector semantic search (foundation, Module 1)
#       * Anna  — hybrid (vector + BM25) + Cohere Rerank (Module 1, Part 5)
#       * Theo  — Aurora as system-of-record · Cedar-gated writes · audit
#                 trail (Module 2, after C5 Experience Guide is wired)
#   - If the room is slow: drop C4 (running_low) and C5 (Experience Guide).
#     Do NOT trim C1-C3 — they're the narrative spine (Stock Keeper closes
#     Marco's gap). If you drop C5, also skip the Theo write-path tour at
#     the end of Module 2.
defaultLocaleCode: en-US
localeCodes:
  - en-US
version: 3.0

awsAccountConfig:
  accountSources:
    - WorkshopStudio
  serviceLinkedRoles:
    - rds.amazonaws.com
    - bedrock.amazonaws.com
  regionConfiguration:
    minAccessibleRegions: 1
    maxAccessibleRegions: 2
    accessibleRegions:
      recommended:
        - us-west-2
      required:
        - us-west-2

infrastructure:
  cloudformationTemplates:
    # Workshop Studio packages everything in `static/` and uploads it
    # to s3://${AssetsBucketName}/${AssetsBucketPrefix}/. The parent
    # stack resolves nested children (pellier-labs.yml → pellier-vpc /
    # pellier-database / pellier-cognito / pellier-code-editor) via
    # ${TemplatesBaseUrl}, which we compose from the Workshop Studio
    # asset variables below. All seven templates plus iam_policy.json
    # must live under lab-content/workshop/static/ for the deploy to
    # resolve. The repo's source-of-truth lives in infrastructure/;
    # static/ is a packaging mirror (see static/README.md).
    - templateLocation: static/pellier-workshop.yml
      label: Pellier Workshop (120 min — re:Invent)
      parameters:
        - templateParameter: WorkshopId
          defaultValue: "{{.ParticipantId}}"
        - templateParameter: WorkshopDomain
          # Cosmetic — only used to build Cognito callback URLs when a
          # federated IdP is enabled. Workshop Studio uses email/password
          # by default (EnableGoogleSignIn=false), so this default is a
          # placeholder that won't be hit.
          defaultValue: "pellier.workshop.aws"
        - templateParameter: LabFormat
          defaultValue: "workshop"
        - templateParameter: RepoUrl
          defaultValue: "https://github.com/aws-samples/sample-pellier-agentic-search-apg.git"
        - templateParameter: RepoBranch
          defaultValue: "main"
        - templateParameter: AuroraEngineVersion
          defaultValue: "17.7"
        - templateParameter: EnableGoogleSignIn
          # Default OFF in Workshop Studio — federated IdP setup needs
          # secrets that aren't part of the standard provisioning flow.
          # Email/password auth via Cognito is enough for the workshop's
          # demo path.
          defaultValue: "false"
        - templateParameter: EnableAppleSignIn
          defaultValue: "false"
        - templateParameter: TemplatesBaseUrl
          # Workshop Studio uploads everything in static/ to
          # s3://${AssetsBucketName}/${AssetsBucketPrefix}/static/.
          # That trailing /static is consistent across every Workshop
          # Studio deploy and is what the parent stack !Subs into the
          # nested-stack TemplateURLs.
          defaultValue: "https://{{.AssetsBucketName}}.s3.{{.AwsRegion}}.amazonaws.com/{{.AssetsBucketPrefix}}static"

participantRole:
  managedPolicies: []
  iamPolicies:
    - static/iam_policy.json

workshopTimeline:
  duration: 120
  checkpoints:
    - "00:00 — Opening talk + Boutique demo (Marco clicks 4 pills)"
    - "00:10 — Module 1 · Observe (tour + model-mix sidebar + swap-a-model + Anna's hybrid pipeline)"
    - "00:30 — Module 2 · Understand (Stock Keeper + Experience Guide + Theo's write-path tour)"
    - "00:55 — Mid-point checkpoint (Marco's Turn 4 works)"
    - "01:40 — Module 3 · Evaluate (Performance + Search Strategy comparison + Evaluations + capstone)"
    - "01:55 — Wrap-up + Q&A"

prerequisites:
  knowledge:
    - "Python 3.13 fluency, including async/await"
    - "Comfort reading 200-line modules and finding insertion points"
    - "Familiarity with LLM concepts: temperature, tool calling, system prompts"
    - "Basic AWS + Bedrock awareness"
  technical:
    - "Bedrock model access: Claude Opus 4.6, Claude Haiku 4.5, Cohere Embed v4, Cohere Rerank v3.5"
    - "Amazon Transcribe streaming access (voice search is optional demo)"
    - "Cognito-supported AWS region (us-west-2 recommended)"
